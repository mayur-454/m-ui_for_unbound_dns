<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unbound DNS Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-panel: #121212;
      --bg-card: #1e1e1e;
      --bg-card2: #252525;
      --bg-hover: #333333;

      --border: #2e2e2e;
      --border-light: #404040;

      --accent: #e0e0e0;
      --accent2: #9e9e9e;
      --accent3: #616161;

      --orange: #ff9800;
      --orange2: #f57c00;
      --green: #4caf50;
      --green2: #388e3c;
      --red: #f44336;
      --red2: #d32f2f;
      --yellow: #fdd835;

      --text: #ffffff;
      --text-dim: #b0b0b0;
      --text-muted: #666666;


      --mono: 'Share Tech Mono', 'Courier New', monospace;
      --sans: 'Exo 2', 'Rajdhani', sans-serif;
      --heading: 'Rajdhani', 'Exo 2', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg-card);
      border-bottom: 2px solid var(--accent3);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 6px;
      /* position: sticky; */
      /* top: 0; */
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0, 140, 255, 0.15);
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .topbar-logo img {
      width: 32px;
      height: 32px;
    }

    .topbar-title {
      font-family: var(--heading);
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .topbar-sep {
      width: 1px;
      height: 30px;
      background: var(--border);
      margin: 0 8px;
    }

    .topbar-hostname {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .topbar-hostname b {
      color: var(--accent);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-clock {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid;
    }

    .status-pill.up {
      background: rgba(0, 230, 118, 0.1);
      border-color: var(--green2);
      color: var(--green);
    }

    .status-pill.down {
      background: rgba(255, 68, 68, 0.1);
      border-color: var(--red2);
      color: var(--red);
    }

    .status-pill.unknown {
      background: rgba(255, 214, 0, 0.1);
      border-color: #a89000;
      color: var(--yellow);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-pill.up .status-dot {
      background: var(--green);
    }

    .status-pill.down .status-dot {
      background: var(--red);
      animation: none;
    }

    .status-pill.unknown .status-dot {
      background: var(--yellow);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      /* min-height: calc(100vh - 56px); */
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding-top: 12px;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 6px 16px 4px;
      font-family: var(--heading);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--heading);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      /* transition: all 0.1s; */
      border-left: 3px solid transparent;
      position: relative;
    }

    .sidebar-item:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-left-color: var(--accent2);
    }

    .sidebar-item.active {
      background: rgba(0, 140, 255, 0.12);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .sidebar-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--accent3);
      color: var(--accent);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-family: var(--mono);
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 16px;
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      padding: 20px;
      overflow-x: hidden;


      max-width: 1024px;
      margin: 0 auto;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: var(--heading);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
    }

    .page-breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .page-breadcrumb span {
      color: var(--accent);
    }

    /* ── CARDS ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(90deg, var(--bg-card2), var(--bg-card));
      border-bottom: 1px solid var(--border);
    }

    .card-header h3 {
      font-family: var(--heading);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      flex: 1;
    }

    .card-header svg {
      width: 16px;
      height: 16px;
      color: var(--orange);
      flex-shrink: 0;
    }

    .card-body {
      padding: 14px 16px;
    }

    /* ── GRID LAYOUTS ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    /* ── STAT TILES ── */
    .stat-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-tile::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-tile.blue::before {
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .stat-tile.orange::before {
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    .stat-tile.green::before {
      background: linear-gradient(90deg, var(--green), transparent);
    }

    .stat-tile.red::before {
      background: linear-gradient(90deg, var(--red), transparent);
    }

    .stat-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-value.blue {
      color: var(--accent);
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.orange {
      color: var(--orange);
    }

    .stat-value.red {
      color: var(--red);
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      height: 6px;
      background: var(--bg-dark);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .progress-fill.blue {
      background: linear-gradient(90deg, var(--accent3), var(--accent));
    }

    .progress-fill.green {
      background: linear-gradient(90deg, var(--green2), var(--green));
    }

    .progress-fill.orange {
      background: linear-gradient(90deg, var(--orange2), var(--orange));
    }

    .progress-fill.red {
      background: linear-gradient(90deg, var(--red2), var(--red));
    }

    /* ── INFO TABLE ── */
    .info-table {
      width: 100%;
      border-collapse: collapse;
    }

    .info-table tr+tr td {
      border-top: 1px solid var(--border);
    }

    .info-table td {
      padding: 7px 10px;
      vertical-align: top;
    }

    .info-table td:first-child {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
      width: 40%;
      padding-right: 16px;
    }

    .info-table td:last-child {
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── FORMS ── */
    .form-section {
      margin-bottom: 24px;
    }

    .form-section-title {
      font-family: var(--heading);
      font-size: 13px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid rgba(30, 58, 95, 0.5);
    }

    .form-row:last-child {
      border-bottom: none;
    }

    .form-label {
      font-family: var(--mono);
      /* font-size: 12px; */
      color: var(--text-dim);
      padding-top: 6px;
    }

    .form-label .key {
      color: var(--accent);
      display: block;
      margin-bottom: 2px;
    }

    .form-label .desc {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .form-control {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 13px;
      width: 100%;
      transition: border-color 0.15s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(0, 136, 204, 0.15);
    }

    .form-control-sm {
      max-width: 140px;
    }

    select.form-control {
      cursor: pointer;
    }

    select.form-control option {
      background: var(--bg-card);
    }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a2845;
      border: 1px solid var(--border-light);
      border-radius: 22px;
      transition: 0.2s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked+.toggle-slider {
      background: rgba(0, 194, 255, 0.2);
      border-color: var(--accent2);
    }

    .toggle input:checked+.toggle-slider:before {
      transform: translateX(20px);
      background: var(--accent);
    }

    .toggle-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      font-family: var(--heading);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.15s;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    .btn-primary {
      background: var(--accent2);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent);
    }

    .btn-orange {
      background: var(--orange2);
      border-color: var(--orange);
      color: #fff;
    }

    .btn-orange:hover {
      background: var(--orange);
    }

    .btn-success {
      background: var(--green2);
      border-color: var(--green);
      color: #000;
    }

    .btn-success:hover {
      background: var(--green);
    }

    .btn-danger {
      background: var(--red2);
      border-color: var(--red);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--red);
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border-light);
      color: var(--text-dim);
    }

    .btn-ghost:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--accent2);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── STICKY APPLY BAR ── */
    .apply-bar {
      position: sticky;
      bottom: 0;
      background: linear-gradient(0deg, var(--bg-dark) 80%, transparent);
      padding: 16px 0 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      margin-top: 20px;
    }

    .apply-bar .msg {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 4px;
      display: none;
    }

    .apply-bar .msg.success {
      background: rgba(0, 176, 80, 0.15);
      border: 1px solid var(--green2);
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .apply-bar .msg.error {
      background: rgba(204, 34, 0, 0.15);
      border: 1px solid var(--red2);
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── TEXTAREA / CODE ── */
    .code-area {
      background: #050d18;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: #7ec8e3;
      width: 100%;
      resize: vertical;
      min-height: 300px;
      tab-size: 4;
    }

    .code-area:focus {
      outline: none;
      border-color: var(--accent2);
    }

    /* ── LOG VIEWER ── */
    .log-viewer {
      background: #050d18;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: #6a9fb5;
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-viewer::-webkit-scrollbar {
      width: 6px;
    }

    .log-viewer::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    .log-viewer::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 3px;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-green {
      background: rgba(0, 176, 80, 0.15);
      color: var(--green);
      border: 1px solid var(--green2);
    }

    .badge-red {
      background: rgba(204, 34, 0, 0.15);
      color: var(--red);
      border: 1px solid var(--red2);
    }

    .badge-blue {
      background: rgba(0, 136, 204, 0.15);
      color: var(--accent);
      border: 1px solid var(--accent3);
    }

    .badge-orange {
      background: rgba(255, 96, 0, 0.15);
      color: var(--orange);
      border: 1px solid var(--orange2);
    }

    .badge-gray {
      background: rgba(74, 106, 122, 0.2);
      color: var(--text-dim);
      border: 1px solid var(--text-muted);
    }

    /* ── ALERT ── */
    .alert {
      padding: 10px 14px;
      border-radius: 4px;
      border-left: 3px solid;
      margin-bottom: 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-info {
      background: rgba(0, 140, 255, 0.1);
      border-color: var(--accent2);
      color: var(--accent);
    }

    .alert-warning {
      background: rgba(255, 214, 0, 0.1);
      border-color: #a89000;
      color: var(--yellow);
    }

    .alert-danger {
      background: rgba(204, 34, 0, 0.1);
      border-color: var(--red2);
      color: var(--red);
    }

    .alert-success {
      background: rgba(0, 176, 80, 0.1);
      border-color: var(--green2);
      color: var(--green);
    }

    /* ── TABS ── */
    .tab-nav {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--heading);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 4px 4px 0 0;
      transition: all 0.15s;
      position: relative;
      top: 1px;
    }

    .tab-btn:hover {
      color: var(--text-dim);
      background: var(--bg-hover);
    }

    .tab-btn.active {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--accent);
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    /* ── INPUT GROUP ── */
    .input-group {
      display: flex;
      gap: 0;
    }

    .input-group .form-control {
      border-radius: 4px 0 0 4px;
      border-right: none;
    }

    .input-group .btn {
      border-radius: 0 4px 4px 0;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-family: var(--heading);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 16px;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 4px;
    }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 5000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card2);
      border: 1px solid var(--border-light);
      border-left: 3px solid;
      border-radius: 6px;
      padding: 12px 16px;
      min-width: 280px;
      font-family: var(--mono);
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      animation: slideIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      border-left-color: var(--green);
      color: var(--green);
    }

    .toast.error {
      border-left-color: var(--red);
      color: var(--red);
    }

    .toast.info {
      border-left-color: var(--accent);
      color: var(--accent);
    }

    .toast.warning {
      border-left-color: var(--orange);
      color: var(--orange);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ── UTILS ── */
    .text-mono {
      font-family: var(--mono);
    }

    .text-accent {
      color: var(--accent);
    }

    .text-orange {
      color: var(--orange);
    }

    .text-green {
      color: var(--green);
    }

    .text-red {
      color: var(--red);
    }

    .text-dim {
      color: var(--text-dim);
    }

    .text-muted {
      color: var(--text-muted);
    }

    .text-sm {
      font-size: 12px;
    }

    .text-xs {
      font-size: 11px;
    }

    .mt-1 {
      margin-top: 8px;
    }

    .mt-2 {
      margin-top: 16px;
    }

    .mb-1 {
      margin-bottom: 8px;
    }

    .mb-2 {
      margin-bottom: 16px;
    }

    .gap-1 {
      gap: 8px;
    }

    .flex {
      display: flex;
    }

    .flex-center {
      display: flex;
      align-items: center;
    }

    .w-full {
      width: 100%;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .grid-3 {
        grid-template-columns: 1fr 1fr;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .sidebar {
        display: none;
      }

      .grid-4 {
        grid-template-columns: 1fr 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="/" class="topbar-logo">
      <img src="https://www.privacidade.digital/assets/img/svg/3rd-party/unbound.svg" alt="Unbound DNS Resolver Logo">
    </a>
    <span class="topbar-title">UNBOUND</span>
    <div class="topbar-sep"></div>
    <span class="topbar-hostname">HOST: <b id="tb-hostname">loading…</b></span>
    <div class="topbar-right">
      <span class="topbar-clock" id="topbar-clock">--:--:--</span>
      <div class="status-pill" id="tb-status-pill">
        <div class="status-dot"></div>
        <span id="tb-status-text">checking…</span>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-section">Navigation</div>
      <a href="/" class="sidebar-item {% if active_tab=='home' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </a>
      <a href="/config" class="sidebar-item {% if active_tab=='config' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
        Config
      </a>
      <a href="/settings" class="sidebar-item {% if active_tab=='settings' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
        Settings
      </a>

      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Controls</div>

      <a href="#" class="sidebar-item" onclick="svcAction('restart');return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
        </svg>
        Restart Unbound
      </a>
      <a href="#" class="sidebar-item" onclick="svcAction('reload');return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2v6h-6" />
          <path d="M3 12a9 9 0 0115-6.7L21 8" />
          <path d="M3 22v-6h6" />
          <path d="M21 12a9 9 0 01-15 6.7L3 16" />
        </svg>
        Reload Config
      </a>
      <a href="#" class="sidebar-item" onclick="flushDns();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 102.13-9.36L1 10" />
        </svg>
        Flush Cache
      </a>

      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Status</div>
      <div style="padding: 8px 20px;">
        <div class="text-xs text-muted" style="margin-bottom:4px;">UNBOUND STATUS</div>
        <div id="sb-status" class="badge badge-gray">checking...</div>
      </div>
      <div style="padding: 4px 20px 12px;">
        <div class="text-xs text-muted" style="margin-bottom:4px;">CONFIG FILE</div>
        <div id="sb-cfgfile" class="text-xs text-mono text-dim" style="word-break:break-all;">—</div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <script>
    // ── UTILS ──
    function toast(msg, type = 'info', duration = 4000) {
      const icons = {
        success: '✓', error: '✗', info: 'ℹ', warning: '⚠'
      };
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; t.style.transition = '0.3s'; setTimeout(() => t.remove(), 300); }, duration);
    }

    async function apiPost(url, data) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return r.json();
    }

    // ── SERVICE ACTIONS ──
    async function svcAction(action) {
      toast(`Sending ${action} to unbound…`, 'info');
      const data = await apiPost(`/api/service/${action}`, {});
      if (data.success) {
        toast(`Unbound ${action} successful`, 'success');
        setTimeout(updateStatus, 1500);
      } else {
        toast(`Failed: ${data.error || 'unknown error'}`, 'error', 6000);
      }
    }

    async function flushDns() {
      toast('Flushing DNS cache…', 'info');
      const data = await apiPost('/api/system/flush_cache', {});
      toast(data.success ? 'DNS cache flushed' : `Failed: ${data.error}`, data.success ? 'success' : 'error');
    }

    // ── STATUS UPDATE ──
    async function updateStatus() {
      try {
        const data = await fetch('/api/stats').then(r => r.json());
        const pill = document.getElementById('tb-status-pill');
        const txt = document.getElementById('tb-status-text');
        const sbst = document.getElementById('sb-status');

        pill.className = 'status-pill ' + (data.active ? 'up' : 'down');
        txt.textContent = data.active ? 'RUNNING' : 'STOPPED';
        if (sbst) {
          sbst.className = 'badge ' + (data.active ? 'badge-green' : 'badge-red');
          sbst.textContent = data.active ? 'running' : 'stopped';
        }
      } catch (e) {
        document.getElementById('tb-status-pill').className = 'status-pill unknown';
        document.getElementById('tb-status-text').textContent = 'UNKNOWN';
      }
    }

    async function updateHostname() {
      try {
        const data = await fetch('/api/sysinfo').then(r => r.json());
        const el = document.getElementById('tb-hostname');
        if (el) el.textContent = data.hostname || '—';
        const cf = document.getElementById('sb-cfgfile');
        if (cf) {
          const files = await fetch('/api/config/files').then(r => r.json());
          cf.textContent = (files.current || '—').replace('/etc/unbound/', '…/');
        }
      } catch (e) { }
    }

    // ── CLOCK ──
    function updateClock() {
      const el = document.getElementById('topbar-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-GB');
    }

    // ── TABS ──
    function switchTab(id) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const pane = document.getElementById('tab-' + id);
      const btn = document.querySelector(`[data-tab="${id}"]`);
      if (pane) pane.classList.add('active');
      if (btn) btn.classList.add('active');
    }

    // ── INIT ──
    updateClock();
    setInterval(updateClock, 1000);
    updateStatus();
    setInterval(updateStatus, 15000);
    updateHostname();
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
