<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Unbound DNS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:    #0b1120;
      --bg-panel:   #0f1829;
      --bg-card:    #111e2e;
      --bg-input:   #0d1624;
      --border:     #1a2d45;
      --border-hi:  #1e3a5f;
      --accent:     #00c2ff;
      --accent-dim: #0080aa;
      --orange:     #ff7a1a;
      --green:      #00e676;
      --red:        #ff4444;
      --text:       #c8d8e8;
      --text-muted: #4a6080;
      --text-dim:   #7090a8;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,194,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(255,122,26,0.03) 0%, transparent 60%);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text);
    }

    .login-logo span b {
      color: var(--accent);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,194,255,0.05);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,194,255,0.04);
      border-radius: 10px 10px 0 0;
    }

    .card-header h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }

    .card-header svg { color: var(--accent); flex-shrink: 0; }

    .card-body { padding: 24px 20px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,194,255,0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #006fa8, #00c2ff);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); filter: brightness(0.95); }

    .btn-full { width: 100%; }

    .alert {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      color: var(--red);
    }

    .login-footer {
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px var(--bg-input) inset;
      -webkit-text-fill-color: var(--text);
    }
  </style>
</head>
<body>

  <div class="login-logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
      <circle cx="24" cy="24" r="20" stroke="#00c2ff" stroke-width="2" fill="none"/>
      <circle cx="24" cy="24" r="4"  fill="#00c2ff"/>
      <path d="M24 4 C10 14 10 34 24 44" stroke="#ff7a1a" stroke-width="1.5" fill="none"/>
      <path d="M24 4 C38 14 38 34 24 44" stroke="#ff7a1a" stroke-width="1.5" fill="none"/>
      <line x1="4"  y1="24" x2="44" y2="24" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="7"  y1="14" x2="41" y2="14" stroke="#1e3a5f" stroke-width="1"/>
      <line x1="7"  y1="34" x2="41" y2="34" stroke="#1e3a5f" stroke-width="1"/>
    </svg>
    <span>UNBOUND <b>DNS</b></span>
  </div>

  <div class="card">
    <div class="card-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <h3>Sign In</h3>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="flex-shrink:0;margin-top:1px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login{% if next %}?next={{ next }}{% endif %}">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username"
                 autocomplete="username" autofocus
                 value="{{ last_username or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
                 autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <div class="login-footer">Unbound DNS Web GUI &mdash; Secured Access</div>

</body>
</html>
